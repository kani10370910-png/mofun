# .gitlab-ci.yml
image: node:23-alpine  # 使用轻量级 Node.js 镜像作为执行环境

stages:
  - install
  - build
  - deploy

# 缓存 node_modules 以加速后续构建
cache:
  key: ${CI_COMMIT_REF_SLUG}  # 每个分支独立缓存
  paths:
    - node_modules/
    - .npm/

# 1. 安装依赖阶段
install-deps:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline  # 使用 ci 命令，严格按 package-lock.json 安装
  artifacts:
    paths:
      - node_modules/  # 将安装好的依赖传递给后续阶段

# 2. 构建阶段（静态导出到 out/，部署到 Nginx 子目录 /mofun）
build-project:
  stage: build
  script:
    - npm run build:export  # 静态导出（自动排除 /api，BASE_PATH=/mofun），产物在 out/
  artifacts:
    paths:
      - out/         # 静态导出产物，供 deploy 阶段 scp 到 Nginx
    expire_in: 1 week # 制品保留时间
  dependencies:
    - install-deps   # 明确依赖上一阶段的 node_modules

# 3. 部署阶段（示例：部署到服务器）
deploy:
  stage: deploy
  image: alpine:latest  # 使用轻量镜像执行部署命令
  before_script:
    - apk add --no-cache sshpass openssh-client
  script:
    # SSHPASS 在 GitLab 项目「Settings · CI/CD · Variables」里配置（受保护/隐藏），不写明文
    # 先清空目标目录再上传，避免残留旧 chunk；目标主机首次连接自动信任
    - sshpass -e ssh -o StrictHostKeyChecking=no root@10.0.120.2x "mkdir -p /data/base/nginx/usr/share/nginx/html/mofun && rm -rf /data/base/nginx/usr/share/nginx/html/mofun/*"
    - sshpass -e scp -o StrictHostKeyChecking=no -r out/* root@10.0.120.2x:/data/base/nginx/usr/share/nginx/html/mofun
  only:
    - main  # 仅在 main 分支推送时执行部署
  dependencies:
    - build-project
